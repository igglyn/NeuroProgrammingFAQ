name: create-png
run-name: Creating PNG from SVG
on: [push]
jobs:
  create-png:
    runs-on: ubuntu-latest
    steps:
      - name: 'checkout repo'
        uses: actions/checkout@v4

      - name: 'Nix jank'
        run: |
          sudo mkdir -p /nix/store
          sudo chown runner:runner /nix/store

      - name: 'Restore nix-store'
        id: restore-nix-store
        uses: actions/cache/restore@v4.2.3
        with:
          path: /nix/store
          key: ${{ runner.os }}-png

      - name: 'move nix-store to correct location'
        if: steps.restore-nix-store.outputs.cache-hit != 'true'
        run: mv NeuroProgrammingFAQ /nix/store

      - name: 'Install nix'
        uses: DeterminateSystems/nix-installer-action@v9

      - name: 'Undoing Nix jank'
        run: sudo chown root:nixbld /nix/store
      
      - name: 'Create PNG'
        run: nix-shell -p firefox --command "firefox -screenshot file://\$(realpath FAQ.svg) --window-size 1280,720"

      - name: 'Upload PNG Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: FAQpng
          path: ./screenshot.png
          retention-days: 5

      - name: 'Cache Firefox'
        if: steps.restore-nix-store.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4.2.3
        with:
          path: /nix/store
          key: ${{ steps.restore-nix-store.outputs.cache-primary-key }}
