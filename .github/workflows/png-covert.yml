name: create-png
run-name: Creating PNG from SVG
on: [push]
jobs:
  create-png:
    runs-on: ubuntu-latest
    steps:
      - name: 'checkout repo'
        uses: actions/checkout@v4

      - name: 'Nix jank'
        run: |
          sudo mkdir /nix
          sudo chown runner:runner /nix

      - name: 'Restore nix-store'
        id: restore-nix-store
        uses: actions/cache/restore@v4.2.3
        with:
          path: /nix
          key: nix-cache-png

      - name: 'Install nix'
        uses: DeterminateSystems/nix-installer-action@v9

      - name: 'Undoing Nix jank'
        run: |
          sudo chown -R root:root /nix
          sudo chown root:nixbld /nix/store
      
      - name: 'Create PNG'
        if: steps.restore-nix-store.outputs.cache-hit != 'true'
        run: nix-shell -p firefox --command "firefox -screenshot file://\$(realpath FAQ.svg) --window-size 1280,720"

      - name: 'Create PNG cached Firefox'
        if: steps.restore-nix-store.outputs.cache-hit == 'true'
        run: |
          /nix/store/*/bin/firefox --command "firefox -screenshot file://\$(realpath FAQ.svg) --window-size 1280,720"
          mv screenshot.png FAQ.png
          
      - name: 'Upload PNG Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: FAQpng
          path: ./FAQ.png
          retention-days: 5

      - name: 'Cache Firefox'
        if: steps.restore-nix-store.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4.2.3
        with:
          path: /nix
          key: ${{ steps.restore-nix-store.outputs.cache-primary-key }}
