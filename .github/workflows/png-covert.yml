name: create-png
run-name: Creating PNG from SVG
on: [push]
jobs:
  create-png:
    runs-on: ubuntu-latest
    steps:
      - name: 'checkout repo'
        uses: actions/checkout@v4

      - name: 'check cache'
        uses: actions/cache@v4
        id: cache
        with:
          path: /nix/store
          key: ${{ runner.os }}-png

      - name: 'Install nix'
        uses: DeterminateSystems/nix-installer-action@v9

      - name: 'Nix jank'
        if: steps.cache.outputs.cache-hit == 'true'
        run: sudo chown root:runner /nix/store

      - name: 'Restore Firefox'
        id: restore-firefox
        if: steps.cache.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v4.2.3
        with:
          path: /nix/store
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: 'Undoing Nix jank'
        if: steps.cache.outputs.cache-hit == 'true'
        run: sudo chown root:nixbld /nix/store
      
      - name: 'Create PNG'
        run: nix-shell -p firefox --command "firefox -screenshot file://\$(realpath FAQ.svg) --window-size 1280,720"

      - name: 'Upload PNG Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: FAQpng
          path: ./screenshot.png
          retention-days: 5

      - name: 'Cache Firefox'
        uses: actions/cache/save@v4.2.3
        with:
          path: /nix/store
          key: ${{ steps.cache.outputs.cache-primary-key }}
